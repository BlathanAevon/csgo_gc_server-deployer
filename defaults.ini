; CS:GO Legacy server deployer — defaults file
; ═══════════════════════════════════════════════════════════════════════════
; Values here are shown as defaults during the interactive wizard.
; Press Enter at any prompt to accept the shown default.
; Secrets (steam_token, rcon_password, sv_password) are never stored here.
; The wizard updates this file automatically after each successful run.

[defaults]
hostname       = My CS:GO_GC Legacy Server
port           = 27015
map_name       = de_dust2
max_players    = 16
tickrate       = 128
session_tool   = tmux
open_firewall  = 0
allow_web_ports = 0
admin_steamid =

; ─────────────────────────────────────────────────────────────────────────────
; Optional addon stack
; ─────────────────────────────────────────────────────────────────────────────
; Set install_sourcemod_stack = 1 to install Metamod:Source + SourceMod.
; plugin_source_path may point to a .smx, .sp, .zip, .tar.gz, .tgz, or folder.
install_sourcemod_stack = 1
metamod_branch = 1.12
sourcemod_branch = 1.12
plugin_source_path =

; ─────────────────────────────────────────────────────────────────────────────
; Game Mode Selection
; ─────────────────────────────────────────────────────────────────────────────
; Presets: competitive, casual, deathmatch, arms_race, demolition, custom
; For custom mode pairs, set game_mode=custom and adjust the numeric values below.
game_mode = competitive
game_type = 0
game_mode_id = 1
sv_skirmish_id = 0

; ─────────────────────────────────────────────────────────────────────────────
; Match / Round Timing (seconds and minutes)
; ─────────────────────────────────────────────────────────────────────────────
mp_warmuptime      = 60
mp_freezetime      = 15
mp_roundtime       = 1.92
mp_buytime         = 20
sv_deadtalk        = 0

; ─────────────────────────────────────────────────────────────────────────────
; Money & Economy
; ─────────────────────────────────────────────────────────────────────────────
mp_startmoney      = 2400
mp_maxmoney        = 16000
mp_buy_anywhere    = 0

; ─────────────────────────────────────────────────────────────────────────────
; Team Dynamics
; ─────────────────────────────────────────────────────────────────────────────
mp_autokick        = 1
mp_tkpunish        = 0
mp_forcecamera     = 0

; ─────────────────────────────────────────────────────────────────────────────
; Bots Configuration
; ─────────────────────────────────────────────────────────────────────────────
; Difficulty: 0=Easy, 1=Normal, 2=Hard, 3=Expert
bot_quota          = 10
bot_difficulty     = 1
bot_controllable   = 1

; ─────────────────────────────────────────────────────────────────────────────
; GOTV (Game Observation TV) - spectators can watch live
; ─────────────────────────────────────────────────────────────────────────────
tv_enable          = 1
tv_delaytime       = 30
tv_maxclients      = 0

; ─────────────────────────────────────────────────────────────────────────────
; Server Logging & Administration
; ─────────────────────────────────────────────────────────────────────────────
sv_logbans         = 1
sv_logecho         = 1
sv_log_onefile     = 1
sv_hibernate_when_empty = 0

; ─────────────────────────────────────────────────────────────────────────────
; System paths — change only if you use a non-standard layout
; ─────────────────────────────────────────────────────────────────────────────
steam_user  = steam
steam_home  = /home/steam
install_dir = /home/steam/csgo_server

; server_ip is intentionally left blank so the wizard always asks for it
; server_ip =
